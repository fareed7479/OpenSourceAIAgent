version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: agent_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: agent_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Cache & Celery Broker
  redis:
    image: redis:alpine
    container_name: agent_redis
    restart: always
    ports:
      - "6379:6379"

  # FastAPI Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/agent_platform
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretjwtkey_change_me_in_production_1234567890
      - ENCRYPTION_KEY=xGj98bX0_y80Pz1-cK4hL9UjWp-892LmnOpQrsTuVwX=
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=http://localhost/auth/callback
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - shared_workspaces:/app/workspaces

  # Frontend Nginx Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  shared_workspaces:
